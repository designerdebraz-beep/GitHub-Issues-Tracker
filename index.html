<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white w-96 p-8 rounded-lg shadow speace-y-4">
        <div class="mx-auto  flex justify-center ">
            <img src="assets/github-logo.png"  alt="" srcset="">
        </div>
        <h1 class="text-2xl font-bold text-center mb-2">
            GitHub Issues Tracker
        </h1>

        <p class="text-center text-gray-500 mb-6">
            Sign in to manage your GitHub issues
        </p>
        <label class="label">Username</label>
        <input id="username" type="text" placeholder="Enter Username" class="w-full border p-2 mb-4 rounded" />
        
        <label class="label">Password</label>
        <input id="password" type="password" placeholder="Enter Password" class="w-full border p-2 mb-4 rounded" />

        <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">
            Sign In
        </button>

        <p class="mt-4 text-sm text-gray-500 text-center font-bold">
            Demo Credentials:<br>
            <span>Username :admin </span> <br>
            <span>Password :admin123 </span>
            <!-- Demo: admin / admin123 -->
        </p>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
